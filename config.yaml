# config.yaml

general:
  input_path: "inputs"
  output_path: "runs"
  task_type: "classification"

run:
  name: null
  seed: 42

data:
  type: "tabular_csv"
  feature_columns: ["col1", "col2", "col3"]
  target_column: "col4"
  batch_size: 32
  splits: [0.6, 0.2, 0.2]
  shuffle: true

components:
  encoder:
    type: "mlp"
    input_dim: 100
    embedding_dim: 128
    hidden_dims: [128, 64]
    dropout: 0.0

  head:
    type: "classification"
    input_dim: 128
    output_dim: 3
    hidden_dims: [128, 64]
    dropout: 0.0

  trainer:
    type: "basic"
    epochs: 500
    learning_rate: 1e-3
    loss_fn: "cross_entropy"
    optimizer: "adam"
    device: "mps"
    metrics_every: 5

logging:
  type: "jsonl"
  log_every: 1

checkpointing:
  enabled: true
  save_every: 5
  save_best: true
  monitor: "val_loss"
  mode: "min"